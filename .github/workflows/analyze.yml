name: boAt HApp Review Analyzer

on:
  schedule:
    - cron: '30 4 * * 1'    # Every Monday 10:00 AM IST (UTC+5:30)
  workflow_dispatch:          # Manual trigger from GitHub UI
  repository_dispatch:
    types: [gmail-trigger]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache BERT model
        uses: actions/cache@v4
        with:
          path: model_cache
          key: bert-model-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main pipeline
        env:
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
        run: python main.py

      - name: Run BERT inference
        env:
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
        run: python inference.py

      - name: Upload Excel to Google Drive
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python upload_to_drive.py

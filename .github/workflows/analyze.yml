name: boAt HApp Review Analyzer

on:
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:
  repository_dispatch:
    types: [gmail-trigger]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache BERT model
        uses: actions/cache@v4
        with:
          path: model_cache
          key: bert-model-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main pipeline
        env:
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python main.py

      - name: Run BERT inference
        env:
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
        run: python inference.py

      - name: Send Excel via email
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python send_email.py

      - name: Upload Excel as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android_HearablesApp_Review_${{ github.run_id }}
          path: Android_HearablesApp_Review.xlsx
          retention-days: 90

name: boAt HApp Review Analyzer

on:
  schedule:
    - cron: '30 4 * * 1'    # Every Monday 10:00 AM IST (UTC+5:30)
  workflow_dispatch:          # Manual trigger from GitHub UI
  repository_dispatch:
    types: [gmail-trigger]    # Triggered from Apps Script via Gmail

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache BERT model
        uses: actions/cache@v4
        with:
          path: model_cache
          key: bert-model-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main pipeline
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
        run: python main.py

      - name: Run BERT inference
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER: ${{ secrets.DRIVE_FOLDER }}
        run: python inference.py

      - name: Upload Excel to Google Drive
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python upload_to_drive.py

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ boAt HApp Weekly Review Report Ready"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: boAt Analyzer
          body: |
            Hi Team,

            The weekly boAt Hearables App review analysis is complete.

            Period  : Last 7 days
            Output  : Android_HearablesApp_Review.xlsx

            The Excel report has been updated on Google Drive.

            — boAt R&D QA Automation

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ boAt HApp Analyzer FAILED"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: boAt Analyzer
          body: |
            The weekly review pipeline failed.

            Check the logs here:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            — boAt R&D QA Automation
